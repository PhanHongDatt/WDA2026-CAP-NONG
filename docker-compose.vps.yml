# ============================================
# Cạp Nông - Docker Compose (VPS Production)
# Services: Nginx, PostgreSQL, Redis, Kafka, Backend, Frontend, AI
# ============================================

services:

  # ─── Nginx Reverse Proxy (HTTP only) ────────
  nginx:
    image: nginx:alpine
    container_name: capnong-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx-vps.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - capnong-network

  # ─── PostgreSQL 16 ───────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: capnong-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-capnong_dev}
      POSTGRES_USER: ${POSTGRES_USER:-capnong}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-capnong123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-capnong} -d ${POSTGRES_DB:-capnong_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - capnong-network

  # ─── Redis 7 ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: capnong-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-capnong123}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-capnong123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - capnong-network

  # ─── Kafka (KRaft mode - Official Apache) ────
  kafka:
    image: apache/kafka:3.7.0
    container_name: capnong-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/kafka-logs
    networks:
      - capnong-network

  # ─── Backend (Spring Boot 3 + Java 21) ───────
  backend:
    build:
      context: ./capnong-be
      dockerfile: Dockerfile
    container_name: capnong-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      # Spring datasource — local PostgreSQL container
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-capnong_dev}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-capnong}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-capnong123}
      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-capnong123}
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      # Supabase OAuth
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
      # Google Gemini AI
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      # Telegram Bot
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-placeholder}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-CapNongBot}
      # Cloudinary
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      # AI Service (Python FastAPI)
      AI_SERVICE_URL: http://ai-service:8001
      # Spring profile
      SPRING_PROFILES_ACTIVE: prod
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    networks:
      - capnong-network

  # ─── Frontend (Next.js 16) ───────────────────
  frontend:
    build:
      context: ./capnong-fe
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    container_name: capnong-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      API_INTERNAL_URL: "http://backend:8080"
      NEXT_PUBLIC_API_URL: "http://35.198.244.51"
      NEXT_PUBLIC_USE_MOCK_DATA: "false"
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Cạp Nông}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    networks:
      - capnong-network

  # ─── AI Service (Python FastAPI + Gemini) ─────
  ai-service:
    build:
      context: ./capnong-ai-service
      dockerfile: Dockerfile
    container_name: capnong-ai-service
    restart: unless-stopped
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: gemini-2.5-flash
      APP_ENV: production
      LOG_LEVEL: INFO
      ALLOWED_ORIGINS: "http://35.198.244.51,http://backend:8080"
    networks:
      - capnong-network

volumes:
  postgres_data:
  redis_data:
  kafka_data:

networks:
  capnong-network:
    driver: bridge

