# ============================================
# Cạp Nông — Nginx Reverse Proxy (PRODUCTION)
# ============================================

# Fix Docker DNS
resolver 127.0.0.11 valid=10s;

# Rate limit
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

# Upstream services
upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:8080;
}

# ─── HTTP (fallback + certbot) ─────────────────
server {
    listen 80;
    server_name capnong.shop www.capnong.shop _;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect toàn bộ sang HTTPS (sau khi có SSL)
    location / {
        return 301 https://$host$request_uri;
        # Nếu cần fallback thì dùng:
        # proxy_pass http://frontend;
    }
}

# ─── HTTPS Server ───────────────────────────────
server {
    listen 443 ssl;
    server_name capnong.shop www.capnong.shop;

    # 🔥 FIX LỖI 413 (QUAN TRỌNG NHẤT)
    client_max_body_size 50M;

    ssl_certificate /etc/letsencrypt/live/capnong.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/capnong.shop/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # ─── AI Service (FastAPI) ─────────────────
    location /fastapi/ {
        client_max_body_size 50M;

        proxy_pass http://capnong-ai-service:8001/;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
    }

    # ─── API → Backend ─────────────────
    location /api/ {
        # Optional: mở rộng riêng cho API nếu upload lớn
        client_max_body_size 50M;

        limit_req zone=api burst=40 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        proxy_next_upstream error timeout http_502 http_503 http_504;

        # Buffer (tránh lỗi ngầm khi response lớn)
        proxy_buffering on;
        proxy_buffers 16 16k;
        proxy_buffer_size 32k;
    }

    # Swagger
    location /swagger-ui/ {
        proxy_pass http://backend;
    }

    location /v3/api-docs {
        proxy_pass http://backend;
    }

    # Health (internal only)
    location /actuator/health {
        proxy_pass http://backend;
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        allow 10.0.0.0/8;
        deny all;
    }

    # ─── Frontend ─────────────────
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Websocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Static cache (Next.js)
    location /_next/static/ {
        proxy_pass http://frontend;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}