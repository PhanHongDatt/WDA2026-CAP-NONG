# ============================================
# Cạp Nông — Nginx Reverse Proxy
# Place at: infra/nginx/nginx.conf
# Mounted into Nginx container as default.conf
# ============================================

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

# Upstream services
upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:8080;
}

# ─── HTTP → HTTPS redirect ──────────────────
server {
    listen 80;
    server_name _;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS Server ───────────────────────────
server {
    listen 443 ssl http2;
    server_name _;

    # SSL certificates (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/capnong.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/capnong.vn/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # ─── Backend API ─────────────────────────
    location /api/ {
        limit_req zone=api burst=40 nodelay;

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for AI endpoints (can be slow)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ─── Swagger UI ──────────────────────────
    location /swagger-ui/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /v3/api-docs {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # ─── Actuator health (restricted) ────────
    location /actuator/health {
        proxy_pass http://backend;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        deny all;
    }

    # ─── Frontend (catch-all) ────────────────
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Next.js HMR in dev, future features)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ─── Static assets caching ───────────────
    location /_next/static/ {
        proxy_pass http://frontend;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
