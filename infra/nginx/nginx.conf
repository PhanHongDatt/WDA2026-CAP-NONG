# ============================================
# Cạp Nông — Nginx Reverse Proxy
# HTTPS Configuration for capnong.shop
# ============================================

limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

upstream frontend { server frontend:3000; }
upstream backend  { server backend:8080;  }

# ─── Redirect HTTP to HTTPS ─────────────────
server {
    listen 80;
    server_name capnong.shop www.capnong.shop;

    location /.well-known/acme-challenge/ { 
        root /var/www/certbot; 
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS Server ───────────────────────────
server {
    listen 443 ssl;
    server_name capnong.shop www.capnong.shop;

    ssl_certificate /etc/letsencrypt/live/capnong.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/capnong.shop/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    location /api/ {
        limit_req zone=api burst=40 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /swagger-ui/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /v3/api-docs {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location /actuator/health {
        proxy_pass http://backend;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 127.0.0.1;
        deny all;
    }

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /_next/static/ {
        proxy_pass http://frontend;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
