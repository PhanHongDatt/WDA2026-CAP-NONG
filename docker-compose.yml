# ============================================
# Cạp Nông - Docker Compose (Development)
# Services: PostgreSQL, Redis, Backend, Frontend
# ============================================

services:

  # ─── PostgreSQL 16 ───────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: capnong-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - capnong-network

  # ─── Redis 7 ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: capnong-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - capnong-network

  # ─── Kafka (KRaft mode - Official Apache) ────
  kafka:
    image: apache/kafka:3.7.0
    container_name: capnong-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    networks:
      - capnong-network

  # ─── Backend (Spring Boot 3 + Java 21) ───────
  backend:
    build:
      context: ./capnong-be
      dockerfile: Dockerfile.dev
    container_name: capnong-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Spring datasource (cloud DB override)
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/${POSTGRES_DB}}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-${POSTGRES_USER}}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-${POSTGRES_PASSWORD}}
      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      # Supabase OAuth
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
      # Google Gemini AI
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      # Telegram Bot
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # Cloudinary
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      # Spring profile
      SPRING_PROFILES_ACTIVE: dev
      # AI Service (Python FastAPI)
      AI_SERVICE_URL: http://ai-service:8001
    ports:
      - "${BACKEND_PORT:-8080}:9999"
      - "5005:5005"
    volumes:
      - ./capnong-be/src:/app/src
      - ./capnong-be/pom.xml:/app/pom.xml
    networks:
      - capnong-network

  # ─── Frontend (Next.js 14) ───────────────────
  frontend:
    build:
      context: ./capnong-fe
      dockerfile: Dockerfile.dev
    container_name: capnong-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Cạp Nông}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      WATCHPACK_POLLING: "true"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./capnong-fe:/app
      - /app/node_modules
      - /app/.next
    networks:
      - capnong-network

  # ─── AI Service (Python FastAPI + Gemini) ─────
  ai-service:
    build:
      context: ./capnong-ai-service
      dockerfile: Dockerfile
    container_name: capnong-ai-service
    restart: unless-stopped
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: gemini-2.5-flash
      GEMINI_IMAGE_MODEL: gemini-2.5-flash-image
      XAI_API_KEY: ${XAI_API_KEY:-}
      APP_ENV: development
      LOG_LEVEL: INFO
      ALLOWED_ORIGINS: "http://localhost:3000,http://backend:9999"
    ports:
      - "8000:8001"
    networks:
      - capnong-network

volumes:
  postgres_data:
  redis_data:
  kafka_data:

networks:
  capnong-network:
    driver: bridge
