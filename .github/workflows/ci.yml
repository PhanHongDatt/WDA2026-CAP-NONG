name: CI - Build & Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-test:
    name: Backend (Java/Spring)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Run Maven Tests
        run: |
          cd capnong-be
          chmod +x mvnw
          ./mvnw test -B

  frontend-build:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: capnong-fe/package-lock.json
      - name: Install dependencies
        run: |
          cd capnong-fe
          npm ci --legacy-peer-deps
      - name: Code Linting
        run: |
          cd capnong-fe
          npm run lint
      - name: Build
        run: |
          cd capnong-fe
          npm run build

  ai-test:
    name: AI Service (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          cd capnong-ai-service
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Pytest
        run: |
          cd capnong-ai-service
          PYTHONPATH=. pytest -v
