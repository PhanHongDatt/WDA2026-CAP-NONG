name: CD - Deploy to AWS EC2

on:
  workflow_run:
    workflows: ["CI - Build & Test"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy
    # Only deploy if CI passed AND it was a push to main (not a PR)
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          RDS_ENDPOINT: ${{ secrets.RDS_ENDPOINT }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_BOT_USERNAME: ${{ secrets.TELEGRAM_BOT_USERNAME }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER || 'ec2-user' }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          envs: POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,RDS_ENDPOINT,REDIS_PASSWORD,JWT_SECRET,GEMINI_API_KEY,TELEGRAM_BOT_TOKEN,TELEGRAM_BOT_USERNAME,CLOUDINARY_CLOUD_NAME,CLOUDINARY_API_KEY,CLOUDINARY_API_SECRET
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="/opt/capnong"
            COMPOSE="sudo docker compose -f $APP_DIR/docker-compose.prod.yml"

            echo "=== Starting deployment at $(date) ==="

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Error: $APP_DIR is not a git repository."
              echo "Please run './deploy.sh setup' on the EC2 host first."
              exit 1
            fi

            cd "$APP_DIR"

            # Preserve existing values for secrets not yet configured in GitHub
            REDIS_PASSWORD="${REDIS_PASSWORD:-$(grep '^REDIS_PASSWORD='        .env 2>/dev/null | cut -d= -f2- || true)}"
            JWT_SECRET="${JWT_SECRET:-$(grep '^JWT_SECRET='                    .env 2>/dev/null | cut -d= -f2- || true)}"
            GEMINI_API_KEY="${GEMINI_API_KEY:-$(grep '^GEMINI_API_KEY='        .env 2>/dev/null | cut -d= -f2- || true)}"
            TELEGRAM_BOT_TOKEN="${TELEGRAM_BOT_TOKEN:-$(grep '^TELEGRAM_BOT_TOKEN='      .env 2>/dev/null | cut -d= -f2- || true)}"
            TELEGRAM_BOT_USERNAME="${TELEGRAM_BOT_USERNAME:-$(grep '^TELEGRAM_BOT_USERNAME='  .env 2>/dev/null | cut -d= -f2- || true)}"
            CLOUDINARY_CLOUD_NAME="${CLOUDINARY_CLOUD_NAME:-$(grep '^CLOUDINARY_CLOUD_NAME='  .env 2>/dev/null | cut -d= -f2- || true)}"
            CLOUDINARY_API_KEY="${CLOUDINARY_API_KEY:-$(grep '^CLOUDINARY_API_KEY='      .env 2>/dev/null | cut -d= -f2- || true)}"
            CLOUDINARY_API_SECRET="${CLOUDINARY_API_SECRET:-$(grep '^CLOUDINARY_API_SECRET='  .env 2>/dev/null | cut -d= -f2- || true)}"

            # Write .env from injected secrets
            printf '%s\n' \
              "POSTGRES_DB=$POSTGRES_DB" \
              "POSTGRES_USER=$POSTGRES_USER" \
              "POSTGRES_PASSWORD=$POSTGRES_PASSWORD" \
              "RDS_ENDPOINT=$RDS_ENDPOINT" \
              "REDIS_PASSWORD=$REDIS_PASSWORD" \
              "JWT_SECRET=$JWT_SECRET" \
              "GEMINI_API_KEY=$GEMINI_API_KEY" \
              "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN" \
              "TELEGRAM_BOT_USERNAME=$TELEGRAM_BOT_USERNAME" \
              "CLOUDINARY_CLOUD_NAME=$CLOUDINARY_CLOUD_NAME" \
              "CLOUDINARY_API_KEY=$CLOUDINARY_API_KEY" \
              "CLOUDINARY_API_SECRET=$CLOUDINARY_API_SECRET" \
              > .env

            # Add safe directory for git to prevent dubious ownership error
            sudo git config --global --add safe.directory "$APP_DIR"

            # Reset local changes and pull latest
            sudo git fetch --all
            sudo git reset --hard origin/main

            # Tag existing images for rollback before building new ones
            echo "--- Tagging current images for rollback..."
            sudo docker tag capnong-backend:latest  capnong-backend:rollback  2>/dev/null || true
            sudo docker tag capnong-frontend:latest capnong-frontend:rollback 2>/dev/null || true
            sudo docker tag capnong-ai-service:latest capnong-ai-service:rollback 2>/dev/null || true

            # Build new images (use layer cache — only rebuild changed layers)
            echo "--- Building images..."
            $COMPOSE build

            # Start containers
            echo "--- Starting containers..."
            $COMPOSE up -d

            # Smoke test: wait up to 90s for backend health
            echo "--- Running smoke test..."
            RETRIES=9
            until curl -sf http://localhost:8080/actuator/health | grep -q '"status":"UP"'; do
              RETRIES=$((RETRIES - 1))
              if [ "$RETRIES" -le 0 ]; then
                echo "✖ Smoke test failed — rolling back..."
                $COMPOSE down --remove-orphans
                sudo docker tag capnong-backend:rollback  capnong-backend:latest  2>/dev/null || true
                sudo docker tag capnong-frontend:rollback capnong-frontend:latest 2>/dev/null || true
                sudo docker tag capnong-ai-service:rollback capnong-ai-service:latest 2>/dev/null || true
                $COMPOSE up -d
                echo "✖ Rolled back to previous release. Investigate and redeploy."
                exit 1
              fi
              echo "  Waiting for backend... ($RETRIES retries left)"
              sleep 10
            done
            echo "✔ Smoke test passed."

            # Prune only dangling images (not all unused — avoids removing rollback tags)
            sudo docker image prune -f

            echo "=== Deployment completed at $(date) ==="
