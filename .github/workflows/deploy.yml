name: CD - Deploy to AWS EC2

on:
  workflow_run:
    workflows: ["CI - Build & Test"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy
    # Only deploy if CI passed AND it was a push to main (not a PR)
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          RDS_ENDPOINT: ${{ secrets.RDS_ENDPOINT }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_BOT_USERNAME: ${{ secrets.TELEGRAM_BOT_USERNAME }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER || 'ec2-user' }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          envs: POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,RDS_ENDPOINT,REDIS_PASSWORD,JWT_SECRET,GEMINI_API_KEY,TELEGRAM_BOT_TOKEN,TELEGRAM_BOT_USERNAME,CLOUDINARY_CLOUD_NAME,CLOUDINARY_API_KEY,CLOUDINARY_API_SECRET
          script_stop: true
          script: |
            echo "Starting deployment at $(date)..."

            if [ ! -d "/opt/capnong/.git" ]; then
              echo "Error: /opt/capnong is not a git repository."
              echo "Please run './deploy.sh setup' on the EC2 host first."
              exit 1
            fi

            cd /opt/capnong

            # Preserve existing values for secrets not yet configured in GitHub
            REDIS_PASSWORD="${REDIS_PASSWORD:-$(grep '^REDIS_PASSWORD='          .env 2>/dev/null | cut -d= -f2- || true)}"
            JWT_SECRET="${JWT_SECRET:-$(grep '^JWT_SECRET='              .env 2>/dev/null | cut -d= -f2- || true)}"
            GEMINI_API_KEY="${GEMINI_API_KEY:-$(grep '^GEMINI_API_KEY='          .env 2>/dev/null | cut -d= -f2- || true)}"
            TELEGRAM_BOT_TOKEN="${TELEGRAM_BOT_TOKEN:-$(grep '^TELEGRAM_BOT_TOKEN='      .env 2>/dev/null | cut -d= -f2- || true)}"
            TELEGRAM_BOT_USERNAME="${TELEGRAM_BOT_USERNAME:-$(grep '^TELEGRAM_BOT_USERNAME='   .env 2>/dev/null | cut -d= -f2- || true)}"
            CLOUDINARY_CLOUD_NAME="${CLOUDINARY_CLOUD_NAME:-$(grep '^CLOUDINARY_CLOUD_NAME='   .env 2>/dev/null | cut -d= -f2- || true)}"
            CLOUDINARY_API_KEY="${CLOUDINARY_API_KEY:-$(grep '^CLOUDINARY_API_KEY='      .env 2>/dev/null | cut -d= -f2- || true)}"
            CLOUDINARY_API_SECRET="${CLOUDINARY_API_SECRET:-$(grep '^CLOUDINARY_API_SECRET='   .env 2>/dev/null | cut -d= -f2- || true)}"

            # Write .env from injected secrets
            printf '%s\n' \
              "POSTGRES_DB=$POSTGRES_DB" \
              "POSTGRES_USER=$POSTGRES_USER" \
              "POSTGRES_PASSWORD=$POSTGRES_PASSWORD" \
              "RDS_ENDPOINT=$RDS_ENDPOINT" \
              "REDIS_PASSWORD=$REDIS_PASSWORD" \
              "JWT_SECRET=$JWT_SECRET" \
              "GEMINI_API_KEY=$GEMINI_API_KEY" \
              "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN" \
              "TELEGRAM_BOT_USERNAME=$TELEGRAM_BOT_USERNAME" \
              "CLOUDINARY_CLOUD_NAME=$CLOUDINARY_CLOUD_NAME" \
              "CLOUDINARY_API_KEY=$CLOUDINARY_API_KEY" \
              "CLOUDINARY_API_SECRET=$CLOUDINARY_API_SECRET" \
              > .env

            # Reset local changes and pull latest
            git fetch --all
            git reset --hard origin/main

            # Rebuild images and start containers
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d

            # Prune old images to prevent disk space issues
            docker system prune -f

            echo "Deployment completed at $(date)"
