# ============================================
# Cạp Nông - Docker Compose (Production - AWS Optimized)
# ============================================

services:

  # ─── Nginx (Lightweight Proxy) ───────────────
  # Note: ALB handles SSL, Nginx only handles internal routing if needed
  # or serves static files.
  nginx:
    image: nginx:alpine
    container_name: capnong-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx-vps.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - capnong-prod

  # ─── Backend (Spring Boot 3) ─────────────────
  backend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/capnong-backend:latest
    container_name: capnong-backend
    restart: unless-stopped
    env_file: .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${RDS_ENDPOINT}:5432/${POSTGRES_DB}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # Tối ưu cho 8GB RAM (Cấp 3GB cho Java)
      JAVA_OPTS: "-Xmx3g -Xms1g"
    deploy:
      resources:
        limits:
          memory: 3500m
        reservations:
          memory: 1024m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - capnong-prod

  # ─── Frontend (Next.js 16) ───────────────────
  frontend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/capnong-frontend:latest
    container_name: capnong-frontend
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: "https://capnong.shop/api"
    deploy:
      resources:
        limits:
          memory: 1500m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - capnong-prod

  # ─── AI Service (FastAPI) ────────────────────
  ai-service:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/capnong-ai-service:latest
    container_name: capnong-ai-service
    restart: unless-stopped
    env_file: .env
    deploy:
      resources:
        limits:
          memory: 2000m
    networks:
      - capnong-prod

  # ─── Redis (Cache) ───────────────────────────
  redis:
    image: redis:7-alpine
    container_name: capnong-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - capnong-prod

  # ─── Kafka (Messaging) ───────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: capnong-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
    volumes:
      - kafka_data:/var/kafka-logs
    networks:
      - capnong-prod

volumes:
  redis_data:
  kafka_data:

networks:
  capnong-prod:
    driver: bridge
