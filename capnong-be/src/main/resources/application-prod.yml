# ============================================
# Cạp Nông - Production Config
# Activate with: SPRING_PROFILES_ACTIVE=prod
# ============================================

server:
  port: 8080

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000

  cache:
    redis:
      time-to-live: 1800000     # 30 minutes

logging:
  level:
    root: WARN
    com.capnong: INFO
    org.hibernate.SQL: WARN
