# ============================================
# Cạp Nông - Production Config
# Activate with: SPRING_PROFILES_ACTIVE=prod
# ============================================

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  cache:
    redis:
      time-to-live: 1800000     # 30 minutes

logging:
  level:
    root: WARN
    com.capnong: INFO
    org.hibernate.SQL: WARN
