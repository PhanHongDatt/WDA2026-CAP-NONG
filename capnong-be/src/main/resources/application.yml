# ============================================
# Cạp Nông - Spring Boot Application Config
# Profile: Development
# ============================================

server:
  port: 8080

# ─── Spring Core ───────────────────────────────
spring:
  application:
    name: capnong-be

  # ─── PostgreSQL DataSource ─────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/capnong_dev}
    username: ${SPRING_DATASOURCE_USERNAME:capnong}
    password: ${SPRING_DATASOURCE_PASSWORD:capnong123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000

  # ─── JPA / Hibernate ──────────────────────
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ─── Seed Data ───────────────────────────
  sql:
    init:
      mode: always

  # ─── Redis ─────────────────────────────────
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 5000ms

  # ─── Cache (@Cacheable) ───────────────────
  cache:
    type: redis
    redis:
      time-to-live: 600000        # 10 minutes in milliseconds
      cache-null-values: false
      use-key-prefix: true
      key-prefix: "capnong:"

  # ─── File Upload ──────────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

# ─── JWT ─────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-change-in-production}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# ─── AI Provider (hiện dùng OpenAI/MegaLLM, sau chuyển Gemini) ──
  ai:
    api-key: ${AI_API_KEY:sk-mega-92eb00a3dda468dbd97bfe465583153ce53d993099baf62a76475bfa0fcefd1e}
    model: ${AI_MODEL:openai-gpt-oss-20b}
    base-url: ${AI_BASE_URL:https://api.mega-llm.com/v1}

# ─── Google Gemini AI (dự phòng) ─────────────
  gemini:
    api-key: ${GEMINI_API_KEY:}

# ─── Telegram Bot ────────────────────────────
  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    bot-username: ${TELEGRAM_BOT_USERNAME:}

# ─── Logging (Dev) ──────────────────────────
logging:
  level:
    root: INFO
    com.capnong: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
