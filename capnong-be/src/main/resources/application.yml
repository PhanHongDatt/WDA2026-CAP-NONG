# ============================================
# Cạp Nông - Spring Boot Application Config
# Profile: Development
# ============================================

server:
  port: ${SERVER_PORT:8080}

# ─── Spring Core ───────────────────────────────
spring:
  application:
    name: capnong-be
  profiles:
    active: dev, seed

  # ─── PostgreSQL Supabase DataSource ─────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/capnong_dev}
    username: ${SPRING_DATASOURCE_USERNAME:capnong}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000

  # ─── JPA / Hibernate ──────────────────────
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    defer-datasource-initialization: false

  # ─── Disable data.sql init (use manual migration) ──
  sql:
    init:
      mode: never

  # ─── Redis ─────────────────────────────────
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 5000ms

  # ─── Cache (@Cacheable) ───────────────────
  cache:
    type: redis
    redis:
      time-to-live: 600000 # 10 minutes in milliseconds
      cache-null-values: false
      use-key-prefix: true
      key-prefix: "capnong:"

  # ─── File Upload ──────────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

# ─── JWT ─────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-change-in-production}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}              # Access token: 1h
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}  # Refresh token: 7 ngày

  # ─── Supabase OAuth ───────────────────────────
  supabase:
    url: ${NEXT_PUBLIC_SUPABASE_URL:}
    anon-key: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:}

  # ─── Google Gemini AI ────────────────────────
  gemini:
    api-key: ${GEMINI_API_KEY:}

  # ─── Telegram Bot ────────────────────────────
  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    bot-username: ${TELEGRAM_BOT_USERNAME:}
    webhook-url: ${TELEGRAM_WEBHOOK_URL:}
    webhook-secret-token: ${TELEGRAM_WEBHOOK_SECRET_TOKEN:} # header X-Telegram-Bot-Api-Secret-Token

  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}

  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:8000}

# ─── Logging (Dev) ──────────────────────────
logging:
  level:
    root: INFO
    com.capnong: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

ai:
  service:
    base-url: http://localhost:8000
    timeout: 60000

# ─── Kafka ───────────────────────────────────
spring.kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  admin:
    fail-fast: false
  listener:
    auto-startup: ${KAFKA_LISTENER_AUTO_STARTUP:false}
  consumer:
    group-id: capnong-ai-group
    auto-offset-reset: earliest
    key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  producer:
    key-serializer: org.apache.kafka.common.serialization.StringSerializer
    value-serializer: org.apache.kafka.common.serialization.StringSerializer
