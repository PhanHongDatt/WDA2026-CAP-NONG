version: "3.9"

services:
  ai-service:
    build: .
    container_name: capnong-ai-service
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - APP_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3